<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>題庫測驗系統 - Glass</title>
  <link rel="stylesheet" href="style.css?v=20260312v13" />
</head>
<body>

  <div class="glass-container fade">
    <h1>題庫測驗系統</h1>

    <!--  登入（代碼分庫） -->
    <div id="login">
      <h2> 題庫代碼登入</h2>
      <p class="hint">輸入代碼即可載入對應題庫（如：GHG / IPAS / LAW）。</p>
      <input id="bankKey" type="password" class="input" placeholder="請輸入題庫代碼（例如 GHG）" />
      <button class="btn" onclick="setBankKey()">開始使用</button>
    </div>

    <!-- 題庫輸入（當前代碼沒有題庫時顯示） -->
    <div id="setup" style="display:none;">
      <div class="key-line">目前代碼：<span id="keyLabel_setup" class="key-chip"></span>　
        <button class="btn-secondary" onclick="switchBank()">切換代碼</button>
      </div>

      <h2>請貼上題庫 JSON</h2>
      <textarea id="jsonInput" class="input" placeholder='[
  {"q":"題目？", "options":["A","B","C","D"], "answer":0, "explain":"解析"}
]'></textarea>
      <button class="btn" onclick="saveQuestions()">儲存題庫</button>
    </div>
     
    <!-- 測驗主畫面 -->
    <div id="quiz" style="display:none;">
      <div class="key-line">目前代碼：<span id="keyLabel_quiz" class="key-chip"></span>　
        <button class="btn-secondary" onclick="switchBank()">切換代碼</button>
      </div>

      <!-- 題數選擇 -->
      <div class="select-box">
        <label>選擇練習題數：</label>
        <select id="questionCount" onchange="applyQuestionCount(true)">
          <option value="all">全部題目</option>
          <option value="10">10 題</option>
          <option value="20">20 題</option>
          <option value="30">30 題</option>
          <option value="50">50 題</option>
        </select>
      </div>

      <!-- 進度與計分 -->
      <div class="progress-bar"><div id="progress" class="progress"></div></div>
      <div class="score">題目 <span id="current">0</span>/<span id="total">0</span> ｜ 分數：<span id="score">0</span></div>

      <h2 id="question" class="fade"></h2>
      <div id="options" class="fade"></div>

      <p id="feedback"></p>
      
      <button class="btn" onclick="reshuffleNewSet()">重新抽題</button>
      <button class="btn-secondary" onclick="prevQuestion()">上一題</button>
      <button class="btn" onclick="nextQuestion()">下一題</button>
      <button class="btn-warning" onclick="showWrong()">查看錯題本</button>
      <button class="btn-danger" onclick="resetAll()">重置本代碼題庫＆資料</button>
    </div>

    <!-- ❌ 錯題本 -->
    <div id="wrongBox" style="display:none;">
      <div class="key-line">目前代碼：<span id="keyLabel_wrong" class="key-chip"></span></div>
      <h2>❌ 錯題本</h2>
      <ul id="wrongList"></ul>
      <button class="btn" onclick="backToQuiz()">返回測驗</button>
    </div>
  </div>

  <script src="script.js?v=20260312v13"></script>
</body>
</html>
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>題庫主題預覽</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="glass-container fade">
    <header style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px;">
      <h2 style="margin:0;">題目：CSS 盒模型</h2>
      <button id="themeToggle" class="btn-secondary" aria-pressed="false" title="切換主題">🌓 主題</button>
    </header>

    <p class="hint">請選出控制元素「外距」的屬性：</p>
    <div id="options">
      <button class="option-btn">padding</button>
      <button class="option-btn correct">margin（正確）</button>
      <button class="option-btn">border</button>
      <button class="option-btn incorrect">display（錯誤）</button>
    </div>

    <div class="result-detail" style="margin-top:16px;">
      <strong>解析：</strong> margin 控制外距；padding 控制內距。
    </div>

    <div class="result-buttons" style="margin-top:16px;">
      <button class="btn">下一題</button>
      <button class="btn-secondary">加入收藏</button>
    </div>
  </div>

  <script>
    // 主題切換（含記憶）
    (function () {
      const html = document.documentElement;
      const key = 'qb-theme'; // localStorage key
      const btn = document.getElementById('themeToggle');

      // 初始化：若用戶有選過，就讀取
      const saved = localStorage.getItem(key);
      if (saved === 'light') {
        html.dataset.theme = 'light';
        btn?.setAttribute('aria-pressed', 'true');
        btn?.setAttribute('title', '切換為深灰主題');
      } else if (saved === 'dark') {
        // 深灰：你可以不設 data-theme 代表深灰；若想明確，改成 html.dataset.theme = 'dark' 並在 CSS 增加對應區塊
        btn?.setAttribute('aria-pressed', 'false');
        btn?.setAttribute('title', '切換為淺色主題');
      } else {
        // 跟隨系統偏好（第一次使用）
        const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        if (prefersLight) {
          html.dataset.theme = 'light';
          btn?.setAttribute('aria-pressed', 'true');
          btn?.setAttribute('title', '切換為深灰主題');
        }
      }

      // 點擊切換
      btn?.addEventListener('click', () => {
        const next = html.dataset.theme === 'light' ? 'dark' : 'light';
        if (next === 'dark') {
          delete html.dataset.theme;          // 預設視為深灰主題
          localStorage.setItem(key, 'dark');
          btn.setAttribute('aria-pressed', 'false');
          btn.setAttribute('title', '切換為淺色主題');
        } else {
          html.dataset.theme = 'light';
          localStorage.setItem(key, 'light');
          btn.setAttribute('aria-pressed', 'true');
          btn.setAttribute('title', '切換為深灰主題');
        }
      });
    })();
  </script>
</body>
</html>
